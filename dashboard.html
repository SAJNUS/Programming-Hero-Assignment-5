<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="navbar-logo">
            <span class="navbar-title">GitHub Issues Tracker</span>
        </div>
        <div class="navbar-right">
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="Search issues...">
                <button class="btn-search" id="btn-search">Search</button>
                <button class="btn-new-issue">+ New Issue</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="all">All</button>
            <button class="tab-btn" data-tab="open">Open</button>
            <button class="tab-btn" data-tab="closed">Closed</button>
        </div>

        <div class="info-section">
            <div class="info-left">
                <img src="assets/Aperture.png" alt="Issues Icon" class="info-icon">
                <div class="info-text">
                    <h2 class="info-title"><span id="issue-count">50</span> Issues</h2>
                    <p class="info-subtitle">Track and manage your project issues</p>
                </div>
            </div>
            <div class="info-right">
                <span class="status-badge status-open">
                    <span class="status-dot"></span> Open
                </span>
                <span class="status-badge status-closed">
                    <span class="status-dot"></span> Closed
                </span>
            </div>
        </div>

        <div class="loading-spinner" id="loading-spinner">
            <div class="spinner"></div>
            <p>Loading issues...</p>
        </div>

        <div class="issues-grid" id="issues-grid">
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <div class="modal-badges">
                    <span class="modal-status-badge" id="modal-status"></span>
                </div>
            </div>
            <div class="modal-tags">
                <span class="modal-tag" id="modal-label"></span>
                <span class="modal-tag" id="modal-priority-tag"></span>
            </div>
            <div class="modal-body">
                <p id="modal-description"></p>
            </div>
            <div class="modal-info">
                <div class="modal-info-item">
                    <span class="modal-info-label">Assignee:</span>
                    <span class="modal-info-value" id="modal-author"></span>
                </div>
                <div class="modal-info-item">
                    <span class="modal-info-label">Priority:</span>
                    <span class="modal-priority-badge" id="modal-priority"></span>
                </div>
            </div>
            <button class="modal-close-btn" id="modal-close-btn">Close</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
