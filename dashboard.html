<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="navbar-logo">
            <span class="navbar-title">GitHub Issues Tracker</span>
        </div>
        <div class="navbar-right">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 13C10.3137 13 13 10.3137 13 7C13 3.68629 10.3137 1 7 1C3.68629 1 1 3.68629 1 7C1 10.3137 3.68629 13 7 13Z" stroke="#6a737d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M11.5 11.5L15 15" stroke="#6a737d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <input type="text" class="search-input" id="search-input" placeholder="Search issues...">
                </div>
                <button class="btn-search" id="btn-search">Search</button>
                <button class="btn-new-issue">+ New Issue</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="all">All</button>
            <button class="tab-btn" data-tab="open">Open</button>
            <button class="tab-btn" data-tab="closed">Closed</button>
        </div>

        <div class="info-section">
            <div class="info-left">
                <img src="assets/Aperture.png" alt="Issues Icon" class="info-icon">
                <div class="info-text">
                    <h2 class="info-title"><span id="issue-count">50</span> Issues</h2>
                    <p class="info-subtitle">Track and manage your project issues</p>
                </div>
            </div>
            <div class="info-right">
                <span class="status-badge status-open">
                    <span class="status-dot"></span> Open
                </span>
                <span class="status-badge status-closed">
                    <span class="status-dot"></span> Closed
                </span>
            </div>
        </div>

        <div class="loading-spinner" id="loading-spinner">
            <div class="spinner"></div>
            <p>Loading issues...</p>
        </div>

        <div class="issues-grid" id="issues-grid">
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <div class="modal-meta">
                <span class="modal-status-badge" id="modal-status"></span>
                <span class="modal-meta-text" id="modal-meta-info"></span>
            </div>
            <div class="modal-tags" id="modal-tags">
            </div>
            <div class="modal-body">
                <p id="modal-description"></p>
            </div>
            <div class="modal-info">
                <div class="modal-info-left">
                    <div class="modal-info-label">Assignee:</div>
                    <div class="modal-info-value" id="modal-author"></div>
                </div>
                <div class="modal-info-right">
                    <div class="modal-info-label">Priority:</div>
                    <span class="modal-priority-badge" id="modal-priority"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-close-btn" id="modal-close-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
