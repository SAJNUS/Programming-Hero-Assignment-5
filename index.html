<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="logo">
            <h1 class="title">GitHub Issues Tracker</h1>
            <p class="subtitle">Sign in to manage your issues</p>
            
            <form id="loginForm" class="form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <p class="default-text">Default: admin</p>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <p class="default-text">Default: admin123</p>
                </div>
                <button type="submit" class="btn-signin">Sign In</button>
            </form>
            
            <div class="divider">OR</div>
            
            <div class="demo-credentials">
                <p class="demo-header">Demo Credentials:</p>
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
